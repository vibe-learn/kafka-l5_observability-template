# 3-node Kafka cluster in KRaft mode (no ZooKeeper). Spins up on
# localhost:9092, :9093, :9094 — use any as bootstrap server.
# Stop with:  docker compose down -v
services:
  kafka-1:
    image: bitnami/kafka:3.7
    container_name: kafka-1
    ports: ["9092:9092"]
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9094,2@kafka-2:9094,3@kafka-3:9094"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9094"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_KRAFT_CLUSTER_ID: "vibe-learn-kraft-cluster"
      ALLOW_PLAINTEXT_LISTENER: "yes"

  kafka-2:
    image: bitnami/kafka:3.7
    container_name: kafka-2
    ports: ["9093:9092"]
    environment:
      KAFKA_CFG_NODE_ID: 2
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9094,2@kafka-2:9094,3@kafka-3:9094"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9094"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9093"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_KRAFT_CLUSTER_ID: "vibe-learn-kraft-cluster"
      ALLOW_PLAINTEXT_LISTENER: "yes"

  kafka-3:
    image: bitnami/kafka:3.7
    container_name: kafka-3
    ports: ["9094:9092"]
    environment:
      KAFKA_CFG_NODE_ID: 3
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka-1:9094,2@kafka-2:9094,3@kafka-3:9094"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9094"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9094"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_KRAFT_CLUSTER_ID: "vibe-learn-kraft-cluster"
      ALLOW_PLAINTEXT_LISTENER: "yes"
